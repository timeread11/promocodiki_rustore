<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет интернета - Промокодики</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9fafb;
            color: #111827;
            text-align: center;
            padding: 20px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            color: #9ca3af;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            color: #4b5563;
            margin-bottom: 32px;
            max-width: 300px;
        }
        .button {
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5);
            transition: background-color 0.2s, transform 0.1s;
        }
        .button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 4px -1px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body>

    <div class="icon">📡</div>
    <h1>Нет подключения</h1>
    <p>Похоже, вы отключены от интернета. Проверьте соединение и попробуйте снова.</p>
    
    <button class="button" onclick="retryConnection()">Обновить</button>

    <script>
        function retryConnection() {
            // Capacitor reload functionality. Since we are using an errorPath, 
            // the webview can be reloaded by navigating to the main URL again.
            window.location.href = 'https://promocodiki.ru';
        }
        
        // Listen for online event and auto-refresh
        window.addEventListener('online', function() {
            retryConnection();
        });
    </script>
</body>
</html>
